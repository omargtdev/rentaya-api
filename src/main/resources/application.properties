spring.application.name=rentaya-api

# SpringDoc configurations
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

# JPA / PostgreSQL configurations
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/rentaya}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:rootroot}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT authentication
jwt.secret=${JWT_SECRET:rentaya-local-development-secret-key-2026}
jwt.expiration=${JWT_EXPIRATION:86400}

# Optional local development users
rentaya.seed.enabled=${SEED_DATA_ENABLED:false}
